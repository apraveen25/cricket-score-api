name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: './cricket-score-api.slnx'
  API_PROJECT_PATH: './CricketScore.API/CricketScore.API.csproj'
  PUBLISH_OUTPUT: './publish'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal
        continue-on-error: false

      - name: Publish API
        run: |
          dotnet publish ${{ env.API_PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --output ${{ env.PUBLISH_OUTPUT }}

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: cricket-score-api
          path: ${{ env.PUBLISH_OUTPUT }}
          retention-days: 1

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cricket-score-api
          path: ${{ env.PUBLISH_OUTPUT }}

      - name: Login to Azure
        run: az login --use-device-code

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_OUTPUT }}
